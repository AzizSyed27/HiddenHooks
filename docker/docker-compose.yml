services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hiddenhooks_db
    environment:
      POSTGRES_USER: hiddenhooks
      POSTGRES_PASSWORD: hiddenhooks
      POSTGRES_DB: hiddenhooks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiddenhooks -d hiddenhooks"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
